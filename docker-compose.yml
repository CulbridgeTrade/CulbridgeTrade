version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - DATABASE_URL=${DATABASE_URL:-./culbridge.db}
      - JWT_SECRET=${JWT_SECRET:-culbridge-secret-key}
      - API_BASE_URL=${API_BASE_URL:-http://localhost:3000}
    volumes:
      - ./data:/app/data
      - ./culbridge.db:/app/culbridge.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - culbridge-network

  # Optional: PostgreSQL for production
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=culbridge
      - POSTGRES_USER=culbridge
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-culbridge123}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - culbridge-network
    profiles:
      - production

  # Optional: Redis for caching/queues
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - culbridge-network
    profiles:
      - production

networks:
  culbridge-network:
    driver: bridge

volumes:
  postgres-data:
